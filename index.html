<!DOCTYPE html>
<html>
<head>
  <title>Transmission Chain</title>
  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Container to keep content centered and stacked */
    .page-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 850px;
      width: 100%;
      padding: 0 10px;
      box-sizing: border-box;
    }

    /* Header + Buttons container: flex row with space between */
    .header-row {
      width: 100%;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin-bottom: 10px;
    }

    h2 {
      color: white;
      margin: 0;
      font-weight: normal;
      /* allow text wrap */
      white-space: normal;
      word-wrap: break-word;
      overflow-wrap: break-word;
      max-width: 600px;
      flex: 1;
    }

    canvas {
      border: 2px solid white;
      background: white;
      cursor: crosshair;
      max-width: 100%;
      height: auto;
    }

    /* Undo container */
    #undoBtn {
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
      color: white;
      font-size: 16px;
      gap: 6px;
      margin-bottom: 8px;
      flex: none;
      margin-right: auto;
    }
    #undoBtn:hover { text-decoration: underline; }

    #undoIcon {
      width: 20px;
      height: 20px;
      fill: white;
      vertical-align: middle;
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
      margin-left: auto;
      flex: none;
    }
    .mode-text {
      font-weight: bold;
      color: white;
      transition: 0.3s;
      opacity: 0.5;
    }
    .mode-text.active { opacity: 1; }
    #toggle_checkbox { display: none; }
    label {
      position: relative;
      width: 80px;
      height: 40px;
      background: white;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.3s;
    }
    label:after {
      content: "";
      position: absolute;
      top: 4px;
      left: 4px;
      width: 32px;
      height: 32px;
      background: black;
      border-radius: 50%;
      transition: 0.3s;
    }
    #toggle_checkbox:checked + label:after { left: 44px; }

    /* Buttons */
    .send-button {
      background-color: white;
      color: black;
      border: none;
      padding: 6px 16px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 8px;
      max-width: 140px;
      width: 100%;
      height: 36px;
      align-self: center;
    }
    .send-button:hover { background-color: #ddd; }

    /* ===== TEXT PAGE ===== */
    #textPage {
      display: none; 
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      max-width: 850px;
      padding-top: 80px;
      box-sizing: border-box;
    }
    .text-title {
      color: white;
      font-weight: normal;
      font-size: 28px;
      letter-spacing: 1px;
      text-align: center;
      margin-bottom: 40px;
    }
    .input-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 80vw;
      max-width: 600px;
      gap: 12px;
    }
    .input-container input {
      width: 100%;
      text-align: center;
      font-size: 36px;
      padding: 20px 10px;
      background: black;
      border: none;
      outline: none;
      color: white;
    }
    .input-container input::placeholder { color: rgba(255,255,255,0.4); }
    .input-container button {
      align-self: flex-end;
      white-space: nowrap;
      padding: 10px 28px;
      font-size: 16px;
    }

    /* ===== CUSTOM MODAL ===== */
    #leaveModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #leaveModal .modal-content {
      background: #222;
      color: white;
      padding: 30px;
      text-align: center;
      border-radius: 12px;
      max-width: 500px;
    }
    #leaveModal button {
      margin: 15px 10px 0 10px;
      padding: 8px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
    }
    #leaveModal .confirm { background: white; color: black; }
    #leaveModal .cancel { background: #555; color: white; }
  </style>
</head>
<body>

 <!-- DRAWING PAGE -->
<div id="drawPage" style="display:none;">
  <div class="page-content">
    <div class="header-row" style="align-items: center;">
      <h2 id="drawTitle"></h2>
      <div style="flex: 1;"></div>
    </div>

    <div style="display: flex; align-items: center; margin-top: 10px; margin-bottom: 20px; width: 100%;">
      <div id="undoBtn" title="Undo last action" style="margin-right: auto;">
        <svg id="undoIcon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 5V2L7 7l5 5V7c3.86 0 7 3.14 7 7 0 1.66-.67 3.16-1.76 4.24l1.42 1.42C20.2 18.13 21 15.66 21 13c0-4.97-4.03-9-9-9z"/>
        </svg>
        Undo
      </div>

      <div class="mode-toggle" style="margin: 0 20px;">
        <span class="mode-text left active">Pixel</span>
        <input type="checkbox" id="toggle_checkbox">
        <label for="toggle_checkbox"></label>
        <span class="mode-text right">Pen</span>
      </div>

      <button id="sendDraw" class="send-button" style="margin-left: auto;">Send to Print</button>
    </div>

    <canvas id="canvas" width="800" height="800"></canvas>
    <button id="reloadBtn" class="send-button" style="margin-top:20px;">Reload Page</button>
  </div>
</div>

  <!-- TEXT PAGE -->
  <div id="textPage">
    <div class="page-content">
      <h2 class="text-title">What is that?</h2>
      <div class="input-container">
        <input type="text" id="textInput" placeholder="Without saying its name..." autofocus>
        <button id="sendText" class="send-button">Send to Print</button>
      </div>
    </div>
  </div>

  <!-- PROMPT PAGE -->
  <div id="promptPage">
    <div class="page-content">
      <h2 class="text-title" id="promptText" style="white-space: normal; word-wrap: break-word; overflow-wrap: break-word; max-width: 600px; text-align: center; margin-bottom: 40px;">
        <!-- prompt text inserted here -->
      </h2>
      <button id="startDrawingBtn" class="send-button" style="width: auto; max-width: 200px;">Start Drawing</button>
    </div>
  </div>

  <!-- CUSTOM LEAVE MODAL -->
  <div id="leaveModal">
    <div class="modal-content">
      <p>WAITTTTT reloading will cause us to break the current transmission chain!!! Are you sure?</p>
      <button class="confirm" id="confirmLeave">Yes, reload</button>
      <button class="cancel" id="cancelLeave">Cancel</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const toggleBtn = document.getElementById("toggle_checkbox");
    const leftText = document.querySelector(".mode-text.left");
    const rightText = document.querySelector(".mode-text.right");
    const drawPage = document.getElementById("drawPage");
    const textPage = document.getElementById("textPage");
    const promptPage = document.getElementById("promptPage");
    const drawTitle = document.getElementById("drawTitle");
    const sendDrawBtn = document.getElementById("sendDraw");
    const sendTextBtn = document.getElementById("sendText");
    const textInput = document.getElementById("textInput");
    const undoBtn = document.getElementById("undoBtn");
    const startDrawingBtn = document.getElementById("startDrawingBtn");
    const promptText = document.getElementById("promptText");

    const reloadBtn = document.getElementById("reloadBtn");
    const leaveModal = document.getElementById("leaveModal");
    const confirmLeave = document.getElementById("confirmLeave");
    const cancelLeave = document.getElementById("cancelLeave");

    let drawing = false;
    let pixelMode = true;
    let pixelGridSize = 15;
    let canvasSize = 800;

    let penStrokes = [];
    let pixelActions = [];
    let currentStroke = [];

    // Your list of prompts for the prompt page
    const prompts = [
      "Draw a castle made of candy",
      "Look around the room, what's the weirdest thing you see?",
      "Draw a futuristic flying car",
      "What would a cat look like if it were a robot?",
      "Imagine a new type of tree and draw it"
    ];

    function pickRandomPrompt() {
      const idx = Math.floor(Math.random() * prompts.length);
      return prompts[idx];
    }

    // Initialize the first prompt page
    let currentPrompt = pickRandomPrompt();
    promptText.textContent = currentPrompt;

    // Canvas drawing setup
    ctx.lineWidth = 50;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    toggleBtn.addEventListener("change", () => {
      pixelMode = !toggleBtn.checked;
      if (toggleBtn.checked) {
        leftText.classList.remove("active");
        rightText.classList.add("active");
      } else {
        leftText.classList.add("active");
        rightText.classList.remove("active");
      }
    });

    // Drawing events
    canvas.addEventListener("mousedown", (e) => {
      drawing = true;
      const rect = canvas.getBoundingClientRect();
      if (!pixelMode) {
        currentStroke = [];
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        currentStroke.push({x, y});
        ctx.beginPath();
        ctx.moveTo(x, y);
      } else {
        drawPixel(e.clientX - rect.left, e.clientY - rect.top);
      }
    });
    canvas.addEventListener("mouseup", () => { drawing = false; if (!pixelMode && currentStroke.length) penStrokes.push(currentStroke); });
    canvas.addEventListener("mouseleave", () => { drawing = false; if (!pixelMode && currentStroke.length) penStrokes.push(currentStroke); });
    canvas.addEventListener("mousemove", (e) => {
      if (!drawing) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      if (pixelMode) drawPixel(x, y);
      else { ctx.lineTo(x, y); ctx.stroke(); currentStroke.push({x, y}); }
    });

    function drawPixel(x, y) {
      const cellSize = canvasSize / pixelGridSize;
      const pixelX = Math.floor(x / cellSize);
      const pixelY = Math.floor(y / cellSize);
      if (!pixelActions.some(p => p.x === pixelX && p.y === pixelY)) pixelActions.push({x: pixelX, y: pixelY, cellSize});
      ctx.fillRect(pixelX * cellSize, pixelY * cellSize, cellSize, cellSize);
    }

    function redrawCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const p of pixelActions) ctx.fillRect(p.x * p.cellSize, p.y * p.cellSize, p.cellSize, p.cellSize);
      ctx.lineWidth = 50;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "black";
      for (const stroke of penStrokes) {
        ctx.beginPath();
        if (stroke.length) {
          ctx.moveTo(stroke[0].x, stroke[0].y);
          for (let i = 1; i < stroke.length; i++) ctx.lineTo(stroke[i].x, stroke[i].y);
          ctx.stroke();
        }
      }
    }

    undoBtn.addEventListener("click", () => {
      if (pixelMode && pixelActions.length) pixelActions.pop();
      else if (!pixelMode && penStrokes.length) penStrokes.pop();
      redrawCanvas();
    });

    function sendToPrinter(content) { console.log("Send to printer:", content); }

    // Start drawing from prompt page
    startDrawingBtn.addEventListener("click", () => {
      drawTitle.textContent = currentPrompt;  // Show prompt only, no "Draw:"
      drawPage.style.display = "flex";
      promptPage.style.display = "none";
      textPage.style.display = "none";
      penStrokes = [];
      pixelActions = [];
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    // Send drawing and go to guess page
    sendDrawBtn.addEventListener("click", () => {
      sendToPrinter(canvas.toDataURL("image/png"));
      drawPage.style.display = "none";
      textPage.style.display = "flex";
      textInput.value = "";
      textInput.focus();
    });

    // Send guess and go back to draw page with new prompt
    sendTextBtn.addEventListener("click", () => {
      const inputText = textInput.value || "something";
      sendToPrinter(inputText);
      currentPrompt = inputText;
      drawTitle.textContent = currentPrompt; // Show the new prompt on draw page
      textPage.style.display = "none";
      drawPage.style.display = "flex";
      penStrokes = [];
      pixelActions = [];
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    // CUSTOM MODAL EVENTS
    reloadBtn.addEventListener("click", () => { leaveModal.style.display = "flex"; });
    cancelLeave.addEventListener("click", () => { leaveModal.style.display = "none"; });
    confirmLeave.addEventListener("click", () => { leaveModal.style.display = "none"; location.reload(); });

    // Standard beforeunload warning (Chrome native)
    window.addEventListener('beforeunload', (e) => {
      e.preventDefault();
      e.returnValue = 'Warning: Reloading will lose the current transmission chain!';
    });

    // Show prompt page first on load
    window.onload = () => {
      promptPage.style.display = "flex";
      drawPage.style.display = "none";
      textPage.style.display = "none";
    };
  </script>
</body>
</html>
